name: Sales sync (OTA)

# Triggers POST /api/sales/sync on the deployed app every 15 minutes. The
# route itself is self-governing (skips if a run is already in progress,
# skips if the source's row count hasn't moved, skips if it's still
# cooling down from a rate limit) — this workflow's only job is to knock
# on the door on a schedule and surface failures in the Actions tab.
#
# Required repo configuration (Settings -> Secrets and variables -> Actions):
#   Variables: SALES_SYNC_URL   -> e.g. https://your-app.vercel.app/api/sales/sync
#   Secrets:   SALES_SYNC_TOKEN -> must match SALES_SYNC_TOKEN in the app's env

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger sales sync
        run: |
          if [ -z "${{ vars.SALES_SYNC_URL }}" ] || [ -z "${{ secrets.SALES_SYNC_TOKEN }}" ]; then
            echo "SALES_SYNC_URL (repo variable) and/or SALES_SYNC_TOKEN (repo secret) are not set." >&2
            exit 1
          fi

          http_status=$(curl -sS -o response.json -w "%{http_code}" \
            --max-time 480 \
            -X POST "${{ vars.SALES_SYNC_URL }}" \
            -H "x-sync-token: ${{ secrets.SALES_SYNC_TOKEN }}")

          echo "HTTP status: $http_status"
          cat response.json
          echo

          if [ "$http_status" -ge 400 ]; then
            echo "Sync request failed." >&2
            exit 1
          fi
